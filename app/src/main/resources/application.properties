# Spring Boot application properties for Java Banking App
# Placeholder Fixer API key - replace with a real key or set via environment variable
fixer.api.key=$(FIXER_API_KEY)

# Spring settings (kept minimal since project may not be a full Spring Boot app yet)
spring.application.name=java-banking-app
# Server port (only relevant if using Spring Web)
server.port=8080

# Logging
logging.level.root=INFO
logging.level.com.github.wningram.financeapp=DEBUG

# Database connection URL
spring.datasource.url=jdbc:postgresql://localhost:5432/finance_db

# Database credentials
spring.datasource.username=postgres
spring.datasource.password=postgres

# Optional: Automatically update the database schema
spring.jpa.hibernate.ddl-auto=update

# Optional: Show the SQL queries in the console (great for debugging)
spring.jpa.show-sql=true
