plugins {
    // Apply the application plugin to add support for building a CLI application in Java.
    id "application"
    id 'org.springframework.boot' version '4.0.3'
}

apply plugin: 'io.spring.dependency-management'

repositories {
    // Use Maven Central for resolving dependencies.
    mavenCentral()
}

dependencies {
    // Use TestNG framework, also requires calling test.useTestNG() below
    testImplementation(libs.testng)

    // Mockito for mocking WebClient and other dependencies
    testImplementation 'org.mockito:mockito-core:5.20.0'
    
    // Spring Test for testing Spring Boot components (includes Mockito)
    testImplementation 'org.springframework.boot:spring-boot-starter-test'

    // This dependency is used by the application.
    implementation(libs.guava)
    
    implementation libs.guice
    
    // JPA/Hibernate for database persistence
    implementation 'org.springframework.boot:spring-boot-starter-data-jpa'
    implementation 'org.postgresql:postgresql'

    // WebClient for calling external HTTP APIs
    implementation 'org.springframework.boot:spring-boot-starter-webflux'
    
    compileOnly 'org.projectlombok:lombok'
    annotationProcessor 'org.projectlombok:lombok'
    
    developmentOnly 'org.springframework.boot:spring-boot-devtools'
}

group = "com.github.wningram"
version = "1.0-ALPHA"

// Apply a specific Java toolchain to ease working on different environments.
java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(25)
    }
}

application {
    // Define the main class for the application.
    mainClass = "com.github.wningram.financeapp.App"
}

tasks.named("test") {
    // Use TestNG for unit tests.
    useTestNG()
}